name: Deploy API to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.HETZNER_HOST }}
  DEPLOY_PATH: /opt/vex-api

jobs:
  deploy:
    name: Build & Deploy (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build for amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w" -o vex-api .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          SSH="ssh -i ~/.ssh/deploy_key root@${{ env.SERVER_HOST }}"
          SCP="scp -i ~/.ssh/deploy_key"

          $SCP vex-api root@${{ env.SERVER_HOST }}:/tmp/vex-api-new

          # Sync scripts (update script, systemd units)
          $SSH "mkdir -p /opt/vex-api/scripts"
          $SCP scripts/vex-update.sh scripts/vex-update.service scripts/vex-update.timer scripts/vex-api.service \
            root@${{ env.SERVER_HOST }}:/opt/vex-api/scripts/
          $SSH "chmod +x /opt/vex-api/scripts/vex-update.sh"

          # Install systemd units for auto-update timer
          $SSH << 'INSTALL_TIMER'
            set -e
            id vex >/dev/null 2>&1 || useradd -r -m -s /usr/sbin/nologin vex
            mkdir -p /opt/vex-api /tmp/vex-sandbox /home/vex/.vex
            chown -R vex:vex /home/vex/.vex /tmp/vex-sandbox
            chown -R vex:vex /opt/vex-api
            cp /opt/vex-api/scripts/vex-update.service /etc/systemd/system/
            cp /opt/vex-api/scripts/vex-update.timer /etc/systemd/system/
            cp /opt/vex-api/scripts/vex-api.service /etc/systemd/system/
            systemctl daemon-reload
            systemctl enable --now vex-update.timer
            VEX_USER=vex VEX_HOME=/home/vex/.vex VEX_REPO=vex-org/releases /opt/vex-api/scripts/vex-update.sh || true
          INSTALL_TIMER

          $SSH << 'DEPLOY'
            set -e
            DEPLOY_PATH=/opt/vex-api
            mkdir -p $DEPLOY_PATH

            # Backup
            [ -f $DEPLOY_PATH/vex-api ] && cp $DEPLOY_PATH/vex-api $DEPLOY_PATH/vex-api.bak

            # Swap
            chmod +x /tmp/vex-api-new
            mv /tmp/vex-api-new $DEPLOY_PATH/vex-api

            # Restart (ExecStartPre may download vex — allow time)
            systemctl restart vex-api || true
            sleep 2

            # Health check (30 attempts × 2s = 60s window)
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:8080/api/website/health > /dev/null 2>&1; then
                echo "✅ Deploy OK"
                exit 0
              fi
              # On first few failures, show service status for debugging
              if [ "$i" = "5" ]; then
                echo "⏳ Still waiting... service status:"
                systemctl status vex-api --no-pager -l 2>&1 | tail -20 || true
                journalctl -u vex-api --no-pager -n 30 2>&1 || true
              fi
              sleep 2
            done

            # Rollback
            echo "❌ Health check failed — rolling back"
            echo "--- Service status ---"
            systemctl status vex-api --no-pager -l 2>&1 | tail -20 || true
            echo "--- Journal ---"
            journalctl -u vex-api --no-pager -n 50 2>&1 || true
            [ -f $DEPLOY_PATH/vex-api.bak ] && mv $DEPLOY_PATH/vex-api.bak $DEPLOY_PATH/vex-api && systemctl restart vex-api
            exit 1
          DEPLOY

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
