server {
    listen 80;
    server_name api.vex-lang.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.vex-lang.org;

    ssl_certificate     /etc/letsencrypt/live/api.vex-lang.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vex-lang.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limit zone (backup — app also has per-IP rate limiting)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    location /api/website/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for code execution
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        proxy_connect_timeout 5s;

        # Response size limit
        proxy_max_temp_file_size 1m;
    }

    # Block all other paths
    location / {
        return 404;
    }
}
